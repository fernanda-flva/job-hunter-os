<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Hunter OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f1a20;
    --surface: #162028;
    --surface2: #1c2830;
    --border: #2a3a42;
    --accent: #ffc15e;
    --accent2: #59a5d8;
    --accent3: #e07a5f;
    --text: #e0fbfc;
    --text-muted: #85756e;
    --text-dim: #3a4f58;
    --success: #7ecba1;
    --warning: #ffc15e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 14px 40px 0;
    position: sticky;
    top: 0;
    background: rgba(15,26,32,0.97);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .header-row2 {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0 12px;
    border-top: 1px solid var(--border);
  }

  .key-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .get-key-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    text-decoration: none;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .get-key-link:hover { color: var(--accent); }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    background: var(--accent);
    color: #0f1a20;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .api-key-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    flex: 1;
    transition: border-color 0.15s;
  }

  .api-key-wrap:focus-within {
    border-color: var(--accent);
  }

  .api-key-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }

  .api-key-dot.active {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
  }

  #api-key-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    width: 100%;
    letter-spacing: 0.03em;
  }

  #api-key-input::placeholder { color: var(--text-dim); }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 97px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 32px 0;
    position: sticky;
    top: 97px;
    height: calc(100vh - 97px);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 20px;
    margin-bottom: 32px;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding: 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    border: 1px solid transparent;
    margin-bottom: 2px;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--surface2);
    color: var(--accent);
    border-color: var(--border);
  }

  .nav-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .nav-item.active .nav-icon { background: rgba(255,193,94,0.12); }

  /* Resume store indicator */
  .resume-status {
    margin: 0 20px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .resume-status-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .resume-status-value {
    font-size: 0.75rem;
    font-weight: 500;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .dot.green { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot.red { background: var(--accent3); }

  /* Main content */
  .main {
    padding: 40px;
    max-width: 900px;
  }

  .module-header {
    margin-bottom: 32px;
  }

  .module-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .module-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .module-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
    max-width: 560px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .card-title span { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; }

  /* Form elements */
  textarea, input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus, input[type="text"]:focus, input[type="url"]:focus {
    border-color: var(--accent);
  }

  textarea::placeholder, input::placeholder { color: var(--text-dim); }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field { margin-bottom: 16px; }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f1a20;
  }

  .btn-primary:hover { background: #ffd08a; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--surface2); color: var(--text); }

  .btn-sm { padding: 8px 16px; font-size: 0.75rem; }

  /* Output area */
  .output-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-size: 0.83rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    min-height: 120px;
    position: relative;
  }

  .output-area.loading { color: var(--text-muted); }
  .output-area.error { border-color: var(--accent3); color: var(--accent3); }

  /* Streaming cursor */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 2px; animation: blink 1s infinite; vertical-align: text-bottom; }

  /* Score badges */
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .score-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .score-value {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
  }

  .score-value.high { color: var(--success); }
  .score-value.med { color: var(--warning); }
  .score-value.low { color: var(--accent3); }
  .score-value.info { color: var(--accent2); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .tab {
    padding: 10px 18px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Flag/alert */
  .flag {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.82rem;
    line-height: 1.5;
    margin-top: 12px;
  }

  .flag.warning { background: rgba(255,193,94,0.08); border: 1px solid rgba(255,193,94,0.25); color: var(--warning); }
  .flag.danger { background: rgba(224,122,95,0.08); border: 1px solid rgba(224,122,95,0.25); color: var(--accent3); }
  .flag.success { background: rgba(126,203,161,0.08); border: 1px solid rgba(126,203,161,0.25); color: var(--success); }
  .flag.info { background: rgba(89,165,216,0.08); border: 1px solid rgba(89,165,216,0.25); color: var(--accent2); }

  /* Copy btn */
  .copy-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
    gap: 8px;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(15,26,32,0.3);
    border-top-color: #0f1a20;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 24px;
  }

  .welcome-ascii {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    line-height: 1.4;
    letter-spacing: 0.05em;
  }

  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 3rem;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .welcome-title em {
    color: var(--accent);
    font-style: normal;
  }

  .welcome-sub {
    color: var(--text-muted);
    max-width: 420px;
    line-height: 1.6;
    font-size: 0.95rem;
  }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 680px;
    margin-top: 8px;
  }

  .module-card-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .module-card-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .module-card-icon { font-size: 1.4rem; margin-bottom: 8px; }
  .module-card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    margin-bottom: 4px;
  }
  .module-card-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    font-weight: 400;
    border: 1px solid;
    margin: 2px;
  }

  .pill.green { color: var(--success); border-color: rgba(126,203,161,0.3); background: rgba(126,203,161,0.06); }
  .pill.red { color: var(--accent3); border-color: rgba(224,122,95,0.3); background: rgba(224,122,95,0.06); }
  .pill.blue { color: var(--accent2); border-color: rgba(89,165,216,0.3); background: rgba(89,165,216,0.06); }
  .pill.yellow { color: var(--accent); border-color: rgba(255,193,94,0.3); background: rgba(255,193,94,0.06); }

  /* Setup panel */
  .setup-banner {
    background: linear-gradient(135deg, rgba(255,193,94,0.05) 0%, rgba(89,165,216,0.05) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .setup-banner h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 6px;
  }

  .setup-banner p { color: var(--text-muted); font-size: 0.83rem; line-height: 1.5; margin-bottom: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* Diff view */
  .diff-added { background: rgba(71,255,176,0.08); border-left: 2px solid var(--success); padding-left: 8px; color: var(--success); }
  .diff-removed { background: rgba(255,107,107,0.06); border-left: 2px solid var(--accent3); padding-left: 8px; color: var(--accent3); text-decoration: line-through; opacity: 0.6; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px; }
    .two-col { grid-template-columns: 1fr; }
    .module-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-row1">
    <div class="logo">
      Job Hunter <span style="color:var(--accent)">OS</span>
      <div class="logo-badge">Beta</div>
    </div>
    <div class="header-meta">AI-POWERED · BUILT WITH CLAUDE · NYC</div>
  </div>
  <div class="header-row2">
    <span class="key-label">🔑 API KEY</span>
    <div class="api-key-wrap">
      <div class="api-key-dot" id="api-key-dot"></div>
      <input
        type="password"
        id="api-key-input"
        placeholder="Paste your Anthropic API key (sk-ant-...) and press Enter"
        autocomplete="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') saveApiKey()"
        oninput="if(this.value.startsWith('sk-ant-')||this.value.startsWith('sk-')) saveApiKey()"
        onclick="if(this.hasAttribute('readonly')) { if(confirm('Clear API key and re-enter?')) clearApiKey(); }"
      />
      <span id="api-key-status" style="font-family:'DM Mono',monospace;font-size:0.65rem;white-space:nowrap"></span>
    </div>
    <a href="https://console.anthropic.com" target="_blank" class="get-key-link">Get key →</a>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Modules</div>
      <div class="nav-item active" onclick="showModule('welcome')" id="nav-welcome">
        <div class="nav-icon">🏠</div> Home
      </div>
      <div class="nav-item" onclick="showModule('setup')" id="nav-setup">
        <div class="nav-icon">⚙️</div> My Profile
      </div>
      <div class="nav-item" onclick="showModule('analyzer')" id="nav-analyzer">
        <div class="nav-icon">🔍</div> Role Analyzer
      </div>
      <div class="nav-item" onclick="showModule('resume')" id="nav-resume">
        <div class="nav-icon">📄</div> Resume Tailor
      </div>
      <div class="nav-item" onclick="showModule('cover')" id="nav-cover">
        <div class="nav-icon">✉️</div> Cover Letter
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Outreach & Tracking</div>
      <div class="nav-item" id="nav-outreach" onclick="renderColdOutreach()">
        <div class="nav-icon">📨</div> Cold Outreach
      </div>
      <div class="nav-item" id="nav-tracker" onclick="renderAppTracker()">
        <div class="nav-icon">📋</div> App Tracker
      </div>
    </div>

    <div style="height:1px;background:var(--border);margin:0 20px 20px"></div>

    <div class="resume-status" id="resume-status-indicator">
      <div class="resume-status-label">Resume</div>
      <div class="resume-status-value">
        <span class="dot red"></span><span id="resume-status-text">Not loaded</span>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="main-content">
    <!-- Content injected by JS -->
  </main>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  resume: '',
  coverLetter: '',
  apiKey: '',
  profile: { name: '', location: 'NYC', level: 'Senior Manager / Director', industries: 'Tech / SaaS, Consulting', skills: 'Process design, Roadmapping, Cross-functional stakeholder management, Data analysis, Competitive research' },
  currentModule: 'welcome'
};

// ─── Claude API ───────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userPrompt, outputEl, streaming = true) {
  if (!state.apiKey) {
    outputEl.classList.remove('loading');
    outputEl.classList.add('error');
    outputEl.textContent = '⚠ No API key set. Paste your Anthropic API key in the header bar above and press Enter.';
    return null;
  }

  outputEl.classList.remove('error');
  outputEl.innerHTML = '<span class="cursor"></span>';
  outputEl.classList.add('loading');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await res.json();
    outputEl.classList.remove('loading');

    if (data.error) {
      outputEl.classList.add('error');
      outputEl.textContent = '⚠ API Error: ' + data.error.message;
      return null;
    }

    const text = data.content?.map(b => b.text || '').join('') || '';
    outputEl.textContent = text;
    return text;
  } catch (err) {
    outputEl.classList.remove('loading');
    outputEl.classList.add('error');
    outputEl.textContent = '⚠ Request failed: ' + err.message;
    return null;
  }
}

// ─── API Key ──────────────────────────────────────────────────────────────────
function saveApiKey() {
  const input = document.getElementById('api-key-input');
  const dot = document.getElementById('api-key-dot');
  const status = document.getElementById('api-key-status');
  const val = input.value.trim();

  if (val.startsWith('sk-ant-') || val.startsWith('sk-')) {
    state.apiKey = val;
    dot.classList.add('active');
    status.textContent = 'KEY SET ✓';
    status.style.color = 'var(--success)';
    input.blur();
    // Mask after saving
    setTimeout(() => {
      input.value = val.slice(0, 14) + '••••••••••••••••';
      input.setAttribute('readonly', true);
      input.style.cursor = 'default';
    }, 400);
  } else if (val.length > 0) {
    status.textContent = 'INVALID KEY';
    status.style.color = 'var(--accent3)';
  }
}

function clearApiKey() {
  state.apiKey = '';
  const input = document.getElementById('api-key-input');
  const dot = document.getElementById('api-key-dot');
  const status = document.getElementById('api-key-status');
  input.value = '';
  input.removeAttribute('readonly');
  input.style.cursor = '';
  dot.classList.remove('active');
  status.textContent = '';
  input.focus();
}


function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.querySelector(`[data-copy="${id}"]`);
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); }
  });
}

async function runAnalyzer() {
  const jd = document.getElementById('ana-jd').value.trim();
  if (!jd) { alert('Please paste a job description first.'); return; }

  const btn = document.getElementById('ana-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';

  document.getElementById('ana-output-wrap').style.display = 'block';
  document.getElementById('ana-scores').style.display = 'block';
  document.getElementById('score-grid').innerHTML = '';

  const system = `You are a senior career strategist and compensation expert specializing in Product Management, Product Operations, Operations, and Strategy roles. You help senior-level professionals (Senior Manager / Director level) make smart decisions about job opportunities.

The candidate profile:
- Name: ${state.profile.name || 'the candidate'}
- Location: ${state.profile.location}
- Target level: ${state.profile.level}
- Background: ${state.profile.industries}
- Skills: ${state.profile.skills}
- Needs H1B visa sponsorship: YES

${state.resume ? `Resume context:\n${state.resume.slice(0, 1500)}` : ''}

Always be direct, specific, and opinionated. Flag risks clearly.`;

  const prompt = `Analyze this job description thoroughly. Provide:

1. **ROLE SNAPSHOT** — Company, title, level, location, work model (remote/hybrid/onsite)

2. **COMPENSATION INTEL** — If salary listed, assess if fair for ${state.profile.location} at this level. If NOT listed, provide realistic salary range benchmarks for this role/level/${state.profile.location} and what the candidate should ask for. Include equity/bonus notes if mentioned.

3. **H1B SPONSORSHIP** — Scan the JD carefully. Flag any language suggesting sponsorship is available (e.g., "will sponsor", "authorized to work") or NOT available (e.g., "must be authorized", "no sponsorship"). Rate likelihood: HIGH / MEDIUM / LOW / NOT MENTIONED. Recommend whether to apply or confirm before applying.

4. **FIT SCORE** — Rate 1-10 how well this role matches the candidate's profile. Explain top 3 alignment points and any gaps.

5. **GREEN FLAGS** — Positive signals about the company/role (growth, team, mission, perks)

6. **RED FLAGS** — Watch-outs: vague scope, unclear seniority, signs of dysfunction, unrealistic expectations, low comp signals

7. **RECOMMENDED QUESTIONS TO ASK** — 3 sharp questions this candidate should ask in interviews based on what's unclear or concerning in the JD

8. **APPLY RECOMMENDATION** — Strong Yes / Yes with caveats / Skip — with a 2-sentence rationale

Job Description:
${jd}`;

  const out = document.getElementById('ana-output');
  const result = await callClaude(system, prompt, out);

  btn.disabled = false;
  btn.innerHTML = '<span>Re-analyze</span>';

  if (result) {
    // Parse out a fit score if mentioned
    const fitMatch = result.match(/fit score[:\s]*(\d+)/i);
    const h1bMatch = result.match(/h1b[^:]*:\s*(HIGH|MEDIUM|LOW|NOT MENTIONED)/i);

    document.getElementById('score-grid').innerHTML = `
      <div class="score-card">
        <div class="score-label">Fit Score</div>
        <div class="score-value ${fitMatch ? (parseInt(fitMatch[1]) >= 7 ? 'high' : parseInt(fitMatch[1]) >= 5 ? 'med' : 'low') : 'info'}">${fitMatch ? fitMatch[1] + '/10' : '—'}</div>
      </div>
      <div class="score-card">
        <div class="score-label">H1B Likelihood</div>
        <div class="score-value ${h1bMatch ? (h1bMatch[1] === 'HIGH' ? 'high' : h1bMatch[1] === 'MEDIUM' ? 'med' : 'low') : 'info'}">${h1bMatch ? h1bMatch[1] : 'CHECK'}</div>
      </div>
      <div class="score-card">
        <div class="score-label">Market</div>
        <div class="score-value info">${state.profile.location.split(',')[0].split(' ').slice(-1)[0]}</div>
      </div>
      <div class="score-card">
        <div class="score-label">Your Level</div>
        <div class="score-value info">Dir+</div>
      </div>`;
  }
}

      `Review this job description for any signals that the company: (1) explicitly prohibits AI-generated cover letters, (2) uses AI detection tools, (3) asks applicants to include a specific word/phrase to prove they read the JD, (4) asks application questions that require genuine human answers, (5) has signals suggesting a human-reviewed process where AI content would stand out negatively.

<script>
// ─── PATCH: showModule (adds outreach + tracker routing) ─────────────────────
const _baseShowModule = window.showModule;
window.showModule = function(name) {
  if (name === 'outreach') { renderColdOutreach(); return; }
  if (name === 'tracker')  { renderAppTracker();   return; }
  if (name === 'analyzer') { 
    if (state.flow && state.flow.active) renderFlowAnalyzer();
    else renderAnalyzer(); 
    return;
  }
  if (name === 'resume') {
    if (state.flow && state.flow.active && state.flow.jd) renderFlowResume();
    else renderResume();
    return;
  }
  if (name === 'cover') {
    if (state.flow && state.flow.active && state.flow.jd) renderFlowCover();
    else renderCover();
    return;
  }
  _baseShowModule(name);
};

// ─── FLOW STATE ───────────────────────────────────────────────────────────────
if (!state.flow) state.flow = { active: false, jd: '', company: '', roleTitle: '', analysisResult: '', tailoredResume: '', coverLetter: '', rescoreResult: '', rescoreResume: '', step: '' };
if (!state.applications) state.applications = [];
state.flow.coverVersions = state.flow.coverVersions || [];
state.flow.selectedPresets = [];
window._outreachPresets = [];

// ─── FLOW BAR ─────────────────────────────────────────────────────────────────
window.renderFlowBar = function(currentStep) {
  const steps = [
    { id:'analyze', label:'Role Analysis', icon:'🔍' },
    { id:'resume',  label:'Resume Tailor', icon:'📄' },
    { id:'rescore', label:'ATS Re-Score',  icon:'📊' },
    { id:'cover',   label:'Cover Letter',  icon:'✉️' },
    { id:'log',     label:'Log App',       icon:'📋' }
  ];
  const idx = steps.findIndex(s => s.id === currentStep);
  const prevStep = idx > 0 ? steps[idx-1] : null;
  return `<div class="flow-bar">
    <div class="flow-bar-inner">
      ${steps.map((s,i) => `
        <div class="flow-step ${i<idx?'done':i===idx?'active':'pending'}"
             onclick="${i<idx?`showFlowStep('${s.id}')`:''}"
             style="${i<idx?'cursor:pointer':''}">
          <div class="flow-step-circle">${i<idx?'✓':s.icon}</div>
          <div class="flow-step-label">${s.label}</div>
        </div>
        ${i<steps.length-1?`<div class="flow-connector ${i<idx?'done':''}"></div>`:''}`).join('')}
    </div>
    <div class="flow-actions">
      ${prevStep?`<button class="btn btn-secondary btn-sm" onclick="showFlowStep('${prevStep.id}')">← Back</button>`:''}
      <button class="btn btn-secondary btn-sm" onclick="startNewFlow()">↺ New Role</button>
      ${currentStep!=='analyze'?`<button class="btn btn-secondary btn-sm" onclick="showModule('analyzer')">Exit Flow</button>`:''}
    </div>
  </div>`;
};

window.showFlowStep = function(step) {
  state.flow.step = step;
  if (step==='analyze') renderFlowAnalyzer && renderFlowAnalyzer();
  else if (step==='resume')  renderFlowResume  && renderFlowResume();
  else if (step==='rescore') renderFlowRescore && renderFlowRescore();
  else if (step==='cover')   renderFlowCover   && renderFlowCover();
  else if (step==='log')     renderAppTracker  && renderAppTracker();
};

window.startNewFlow = function() {
  state.flow = { active:false, jd:'', company:'', roleTitle:'', analysisResult:'', tailoredResume:'', coverLetter:'', rescoreResult:'', rescoreResume:'', step:'', coverVersions:[], selectedPresets:[] };
  renderAnalyzer();
};

// ─── PATCH: logApplicationQuick ──────────────────────────────────────────────
window.logApplicationQuick = function(stage) {
  if (!state.applications) state.applications = [];
  const existing = state.applications.find(a => a.company === state.flow.company && a.role === state.flow.roleTitle);
  if (existing) {
    if (state.flow.rescoreResult) existing.rescoreResult = state.flow.rescoreResult;
    if (state.flow.rescoreResume) existing.rescoreResume = state.flow.rescoreResume;
    if (state.flow.analysisResult) existing.analysisResult = state.flow.analysisResult;
    if (state.flow.tailoredResume) existing.tailoredResume = state.flow.tailoredResume;
    if (state.flow.coverLetter) existing.coverLetter = state.flow.coverLetter;
    existing.stage = stage;
    showToast('✓ Updated — ' + existing.company + ' · ' + existing.role);
    return;
  }
  const app = {
    id: Date.now(), company: state.flow.company||'', role: state.flow.roleTitle||'',
    jd: state.flow.jd||'', analysisResult: state.flow.analysisResult||'',
    tailoredResume: state.flow.tailoredResume||'', coverLetter: state.flow.coverLetter||'',
    rescoreResult: state.flow.rescoreResult||'', rescoreResume: state.flow.rescoreResume||'',
    stage, status:'To Apply', contacts:[],
    dateAdded: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    notes:''
  };
  state.applications.unshift(app);
  showToast('✓ Logged — ' + app.company + ' · ' + app.role);
};

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:12px 20px;font-family:"DM Mono",monospace;font-size:0.75rem;color:var(--accent);z-index:9999;transition:opacity 0.3s'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.style.opacity='0', 2500);
}
</script>

      </div>

window.runRescore = async function() {
  const resumeText = document.getElementById('rescore-resume')?.value.trim();
  if (!resumeText) { alert('Please paste a resume to score.'); return; }
  if (!state.flow.jd) { alert('No JD found. Go back to Step 1.'); return; }
  const btn = document.getElementById('rescore-btn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Scoring...';
  document.getElementById('rescore-output-wrap').style.display='block';
  document.getElementById('rescore-cta').style.display='none';
  document.getElementById('rescore-delta-banner').style.display='none';
  const origMatch = state.flow.analysisResult ? state.flow.analysisResult.match(/Overall:\s*(\d+)\/100/i) : null;
  const origScore = origMatch ? parseInt(origMatch[1]) : null;
  const system = `You are an ATS scoring engine. Score resumes against job descriptions exactly like enterprise ATS systems. Be precise and specific. The candidate is a Senior Manager/Director level professional.`;
  const prompt = `Re-score this updated resume against the same job description.\n\nUPDATED RESUME:\n${resumeText}\n\nJOB DESCRIPTION:\n${state.flow.jd}\n\nReturn exactly:\n## ATS MATCH SCORE\nOverall: [X/100]\nKeyword Match: [X/100]\nExperience Level: [X/100]\nSkills Alignment: [X/100]\n\n## WHAT IMPROVED\n- [specific improvement]\n\n## STILL MISSING\n- [gaps remaining]\n\n## KEYWORD GAPS REMAINING\n**Critical missing:** [comma-separated]\n**Nice-to-have missing:** [secondary]\n\n## HARD SKILLS NOW\n| Skill Required | Has? | Gap |\n|---|---|---|\n[top 6 skills: YES/PARTIAL/NO]\n\n## FINAL RECOMMENDATION\n[2-3 sentences on readiness]`;
  const out = document.getElementById('rescore-output');
  out.classList.remove('error'); out.innerHTML='<span class="cursor"></span>'; out.classList.add('loading');
  try {
    const result = await callClaude(system, prompt, out);
    if (!result) throw new Error('No response');
    state.flow.rescoreResult = result;
    state.flow.rescoreResume = resumeText;
    const newOverall = result.match(/Overall:\s*(\d+)\/100/i);
    const newKw = result.match(/Keyword Match:\s*(\d+)\/100/i);
    const newExp = result.match(/Experience Level:\s*(\d+)\/100/i);
    const newSkills = result.match(/Skills Alignment:\s*(\d+)\/100/i);
    const no = newOverall ? parseInt(newOverall[1]) : null;
    const nk = newKw ? parseInt(newKw[1]) : null;
    const ne = newExp ? parseInt(newExp[1]) : null;
    const ns = newSkills ? parseInt(newSkills[1]) : null;
    const scoreColor = n => n>=75?'#7ecba1':n>=55?'#ffc15e':'#e07a5f';
    if (origScore!==null && no!==null) {
      const delta = no-origScore; const up = delta>0; const same = delta===0;
      const banner = document.getElementById('rescore-delta-banner');
      banner.style.display='block';
      banner.innerHTML=`<div style="display:flex;align-items:flex-start;gap:16px;padding:16px 20px;border-radius:10px;border:1px solid ${up?'rgba(126,203,161,0.3)':same?'rgba(133,117,110,0.3)':'rgba(224,122,95,0.3)'};background:${up?'rgba(126,203,161,0.06)':same?'rgba(133,117,110,0.06)':'rgba(224,122,95,0.06)'}">
        <div style="font-size:2rem;flex-shrink:0">${up?'📈':same?'➡️':'📉'}</div>
        <div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:${up?'#7ecba1':same?'var(--text-muted)':'#e07a5f'}">${up?'+'+delta+' points':same?'No change':delta+' points'} <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted);margin-left:8px">${origScore}/100 → ${no}/100</span></div>
        <div style="font-size:0.8rem;color:var(--text-muted);margin-top:3px">${up&&delta>=10?'Strong improvement — meaningfully more ATS-ready.':up?'Incremental improvement. Review remaining gaps.':same?'Score unchanged. Check gaps for keywords to add.':'Score dropped — review your changes.'}</div></div>
        <div style="margin-left:auto;text-align:center;flex-shrink:0"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;color:${scoreColor(no)}">${no}</div><div style="font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-muted);text-transform:uppercase">New Score</div></div>
      </div>`;
    }
    document.getElementById('rescore-score-grid').innerHTML = [[nk,'Keywords'],[ne,'Exp. Level'],[ns,'Skills']].map(([val,label])=>val?`<div class="score-card"><div class="score-label">${label}</div><div style="display:flex;align-items:center;gap:8px;margin-top:6px"><div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${val}%;background:${scoreColor(val)};border-radius:3px"></div></div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:${scoreColor(val)}">${val}</div></div></div>`:'').join('');
    const formatted = result
      .replace(/^## (.+)$/gm,'<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:0.9rem;color:var(--accent);letter-spacing:0.03em;margin:20px 0 10px;padding-top:16px;border-top:1px solid var(--border)">$1</div>')
      .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
      .replace(/^\| (.+) \|$/gm,row=>{if(row.includes('---'))return'';const cells=row.split('|').filter(c=>c.trim());return`<tr>${cells.map(c=>{const v=c.trim();const col=v==='YES'?'#7ecba1':v==='NO'?'#e07a5f':v==='PARTIAL'?'#ffc15e':'inherit';return`<td style="padding:6px 10px;border:1px solid var(--border);font-size:0.78rem;font-family:'DM Mono',monospace;${col!=='inherit'?'color:'+col+';font-weight:600':''}">${v}</td>`}).join('')}</tr>`;})
      .replace(/((?:<tr>.*<\/tr>\n?)+)/gs,'<table style="width:100%;border-collapse:collapse;margin:8px 0">$1</table>')
      .replace(/^- (.+)$/gm,'<div style="display:flex;gap:8px;margin:4px 0;font-size:0.83rem"><span style="color:var(--accent);flex-shrink:0">→</span><span>$1</span></div>')
      .replace(/\n/g,'<br>');
    out.innerHTML=formatted;
    const ctaLabel=document.getElementById('rescore-cta-label');
    if(no>=75) ctaLabel.textContent=`Strong ATS score (${no}/100). You're ready — write your cover letter →`;
    else if(no>=60) ctaLabel.textContent=`Decent score (${no}/100). Proceed or make one more pass.`;
    else ctaLabel.textContent=`Score still below 60 (${no}/100). Consider tweaking more or address gaps in cover letter.`;
    document.getElementById('rescore-cta').style.display='flex';
  } catch(err) { out.classList.add('error'); out.textContent='⚠ '+err.message; }
  btn.disabled=false; btn.innerHTML='<span>Re-Score Again</span>';
};
</script>


<script>
// ═══ MODULE: FLOW COVER LETTER (with feedback + versioning) ═══════════════════

          <div class="field"><div class="field-label">What excites you about this company?</div><input type="text" id="flow-cov-why" placeholder="e.g. AI-first ops strategy, recent Series B..." /></div>
        </div>
        <div class="field"><div class="field-label">Specific Experience to Highlight</div><input type="text" id="flow-cov-highlight" placeholder="e.g. My ops framework build, the 40% efficiency gain..." /></div>
      </div>
      <div class="card">
        <div class="card-title">⚙️ Options</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">

          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem"><input type="checkbox" id="flow-cov-short" style="accent-color:var(--accent)" /> Short version (3 paragraphs)</label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="runFlowCover()" id="flow-cov-btn"><span>Generate Cover Letter</span></button>
      <div id="flow-cov-policy-wrap" style="display:none;margin-top:20px" class="fade-in"></div>
      <div id="flow-cov-output-wrap" style="display:none;margin-top:20px" class="fade-in">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div class="card-title" style="margin-bottom:0">✉️ Your Cover Letter <span id="cov-version-label" style="color:var(--accent2)">v1</span></div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary btn-sm" onclick="copyText('flow-cov-output')">Copy</button>

          <div id="cov-edit-actions" style="display:none;margin-top:10px;justify-content:flex-end;gap:8px">

            <button class="btn btn-primary btn-sm" onclick="saveCovEdit()">Save Edits</button>
          </div>
        </div>
        <div id="cov-version-history" style="display:none;margin-bottom:16px">
          <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Version History</div>
          <div id="cov-versions-list" style="display:flex;gap:8px;flex-wrap:wrap"></div>
        </div>
        <div class="card" style="border-color:rgba(89,165,216,0.3);background:linear-gradient(135deg,rgba(89,165,216,0.04) 0%,var(--surface) 100%)">
          <div class="card-title">🔄 Refine This Letter <span>Tell Claude what to change — it'll keep what works</span></div>
          <div style="margin-bottom:16px">
            <div class="field-label" style="margin-bottom:8px">Quick Tone Adjustments</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${[['More confident','Make it sound more assertive and self-assured — less hedging'],['More concise','Cut it down, tighter sentences, remove any fluff'],['More conversational','Make it sound warmer and more human, less formal'],['More formal','Make the tone more professional and executive-level'],['Stronger opening','Rewrite just the first paragraph to be a stronger hook'],['Stronger close','Make the closing paragraph more decisive and action-oriented'],['Less AI-sounding','Vary sentence structure more, remove any clichéd phrases'],['More specific','Add more concrete examples or metrics from my background']].map(([label,hint])=>`<button class="tone-preset-btn" onclick="applyTonePreset(this,'${hint.replace(/'/g,"\\'")}')"> ${label}</button>`).join('')}
            </div>
          </div>
          <div class="field">
            <div class="field-label">Custom Feedback <span style="color:var(--text-dim)">(or add to a preset above)</span></div>
            <textarea id="cov-feedback-input" rows="3" placeholder="e.g. The second paragraph feels too generic — make it more specific to their marketplace product challenges..." style="font-family:'DM Sans',sans-serif;font-size:0.83rem"></textarea>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button class="btn-flow" onclick="regenerateWithFeedback()" id="regen-btn">↻ Regenerate with Feedback</button>
            <button class="btn btn-secondary btn-sm" onclick="clearFeedback()">Clear</button>
            <span id="regen-version-counter" style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-dim);margin-left:4px"></span>
          </div>
        </div>
        <div class="flow-cta-bar" id="flow-cov-cta" style="display:none">
          <span class="flow-cta-label">🎉 Cover letter ready. Log this application!</span>
          <button class="btn-log" onclick="logApplicationQuick('full_flow')">📋 Log Application</button>

      </div>

};

window.toggleCovJDEdit = function() {
  const preview = document.getElementById('cov-jd-preview');
  const wrap = document.getElementById('cov-jd-edit-wrap');
  if (!wrap) return;
  wrap.style.display = wrap.style.display==='none' ? 'block' : 'none';
};
window.saveCovJDEdit = function() {
  const val = document.getElementById('flow-cov-jd-input')?.value;
  if (val) state.flow.jd = val;
  toggleCovJDEdit();
};

window.applyTonePreset = function(btn, hint) {
  btn.classList.toggle('selected');
  if (!state.flow.selectedPresets) state.flow.selectedPresets = [];
  const idx = state.flow.selectedPresets.indexOf(hint);
  if (idx===-1) state.flow.selectedPresets.push(hint);
  else state.flow.selectedPresets.splice(idx,1);
};
window.clearFeedback = function() {
  const fi = document.getElementById('cov-feedback-input');
  if (fi) fi.value='';
  document.querySelectorAll('.tone-preset-btn.selected').forEach(b=>b.classList.remove('selected'));
  state.flow.selectedPresets = [];
};
window.toggleCovEdit = function() {
  const out = document.getElementById('flow-cov-output');
  const editArea = document.getElementById('flow-cov-edit-area');
  const editBtn = document.getElementById('cov-edit-btn');
  const actions = document.getElementById('cov-edit-actions');
  if (!out||!editArea) return;
  const isEditing = editArea.style.display!=='none';
  if (!isEditing) { editArea.value=out.textContent; out.style.display='none'; editArea.style.display='block'; actions.style.display='flex'; if(editBtn) editBtn.textContent='👁 Preview'; }
  else { cancelCovEdit(); }
};
window.saveCovEdit = function() {
  const editArea = document.getElementById('flow-cov-edit-area');
  const out = document.getElementById('flow-cov-output');
  if (!editArea||!out) return;
  const newText = editArea.value;
  out.textContent = newText;
  state.flow.coverLetter = newText;
  addCoverVersion(newText,'Manual edit');
  cancelCovEdit();
};
window.cancelCovEdit = function() {
  const out=document.getElementById('flow-cov-output'), editArea=document.getElementById('flow-cov-edit-area'), editBtn=document.getElementById('cov-edit-btn'), actions=document.getElementById('cov-edit-actions');
  if(out) out.style.display='block'; if(editArea) editArea.style.display='none'; if(actions) actions.style.display='none'; if(editBtn) editBtn.textContent='✏️ Edit Directly';
};
window.addCoverVersion = function(text,label) {
  if (!state.flow.coverVersions) state.flow.coverVersions=[];
  state.flow.coverVersions.push({text,label,ts:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});
  state.flow.currentCoverVersion = state.flow.coverVersions.length-1;
  renderVersionHistory();
  const vLabel=document.getElementById('cov-version-label'); if(vLabel) vLabel.textContent='v'+state.flow.coverVersions.length;
  const counter=document.getElementById('regen-version-counter'); if(counter) counter.textContent=state.flow.coverVersions.length+' version'+(state.flow.coverVersions.length>1?'s':'');
};
window.renderVersionHistory = function() {
  const wrap=document.getElementById('cov-version-history'), list=document.getElementById('cov-versions-list');
  if(!wrap||!list) return;
  if((state.flow.coverVersions||[]).length<=1){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML=state.flow.coverVersions.map((v,i)=>`<div class="cov-version-chip ${i===state.flow.currentCoverVersion?'current':''}" onclick="loadCoverVersion(${i})">v${i+1} · ${v.label} · ${v.ts}</div>`).join('');
};
window.loadCoverVersion = function(idx) {
  const v=(state.flow.coverVersions||[])[idx]; if(!v) return;
  state.flow.currentCoverVersion=idx; state.flow.coverLetter=v.text;
  const out=document.getElementById('flow-cov-output'); if(out) out.textContent=v.text;
  const vLabel=document.getElementById('cov-version-label'); if(vLabel) vLabel.textContent='v'+(idx+1);
  renderVersionHistory();
};

window.runFlowCover = async function() {
  const jd=state.flow.jd; if(!jd){alert('No JD loaded.');return;}
  const company=document.getElementById('flow-cov-company')?.value.trim()||'';
  const why=document.getElementById('flow-cov-why')?.value.trim()||'';
  const highlight=document.getElementById('flow-cov-highlight')?.value.trim()||'';
  const checkPolicy=document.getElementById('flow-cov-aipolicy')?.checked;
  const shortVersion=document.getElementById('flow-cov-short')?.checked;
  state.flow.company = company||state.flow.company;
  const btn=document.getElementById('flow-cov-btn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Generating...';
  if(checkPolicy){
    document.getElementById('flow-cov-policy-wrap').style.display='block';
    const pEl=document.createElement('div'); pEl.className='card';
    pEl.innerHTML='<div class="card-title">🤖 AI Policy Check</div><div class="output-area" id="flow-policy-out"></div>';
    document.getElementById('flow-cov-policy-wrap').innerHTML='';
    document.getElementById('flow-cov-policy-wrap').appendChild(pEl);
    await callClaude('You are an expert at identifying when companies screen for AI-generated job applications.',`Review this JD for signals: (1) prohibits AI cover letters, (2) uses AI detection, (3) asks for a specific word/phrase, (4) requires genuine human answers. Give POLICY RISK: HIGH/MEDIUM/LOW, what signals this, and recommendation.\n\nJD: ${jd}`,document.getElementById('flow-policy-out'));
  }
  document.getElementById('flow-cov-output-wrap').style.display='block';
  document.getElementById('flow-cov-cta').style.display='none';
  const bankContext = state.experienceBank ? '\n\nAdditional real experience:\n'+state.experienceBank : '';
  const system = `You are an expert cover letter writer for PM, Product Ops, Operations, and Strategy roles. Human voice, direct, confident. No AI clichés, no buzzwords.\n\nCandidate: ${state.profile.name||'the candidate'} | ${state.profile.level} | ${state.profile.location} | ${state.profile.industries}${state.coverLetter?'\n\nVoice reference:\n'+state.coverLetter.slice(0,500):''}`;
  const prompt = `Write a cover letter.\n\nJD: ${jd}\n${company?'Company: '+company+'\n':''}${why?'Why excited: '+why+'\n':''}${highlight?'Highlight: '+highlight+'\n':''}${state.resume?'Resume context: '+state.resume.slice(0,800)+'\n':''}${bankContext}\n${shortVersion?'3 tight paragraphs.':'4 paragraphs: hook, fit, why company, close.'}\n\nHuman-sounding, specific, no buzzwords. Vary sentence structure.`;
  const out=document.getElementById('flow-cov-output');
  const result = await callClaude(system,prompt,out);
  if(result){
    state.flow.coverLetter=result;
    state.flow.coverVersions=[];
    addCoverVersion(result,'Initial draft');
    document.getElementById('flow-cov-cta').style.display='flex';
  }
  btn.disabled=false; btn.innerHTML='<span>Regenerate</span>';
};

window.regenerateWithFeedback = async function() {
  const currentLetter=state.flow.coverLetter; if(!currentLetter){alert('Generate a cover letter first.');return;}
  const customFeedback=document.getElementById('cov-feedback-input')?.value.trim()||'';
  const presets=state.flow.selectedPresets||[];
  if(!customFeedback&&presets.length===0){alert('Select a tone preset or add custom feedback first.');return;}
  const btn=document.getElementById('regen-btn');
  btn.disabled=true; btn.innerHTML='<div class="spinner" style="border-color:rgba(15,26,32,0.3);border-top-color:#0f1a20;width:14px;height:14px"></div> Regenerating...';
  const presetLabels=Array.from(document.querySelectorAll('.tone-preset-btn.selected')).map(b=>b.textContent.trim());
  const versionLabel=presetLabels.length>0?presetLabels.join(' + ')+(customFeedback?'+custom':''):'Custom feedback';
  const allFeedback=[presets.length>0?'Tone adjustments:\n'+presets.map(p=>'• '+p).join('\n'):'',customFeedback?'Additional feedback:\n'+customFeedback:''].filter(Boolean).join('\n\n');
  const system=`You are an expert cover letter editor. Refine existing cover letters based on specific feedback while preserving what already works. Never start from scratch — keep the structure, key points, and voice; just apply the requested changes precisely.\n\nCandidate: ${state.profile.name||'the candidate'} | ${state.profile.level} | ${state.profile.location}`;
  const prompt=`Current cover letter:\n<current_letter>\n${currentLetter}\n</current_letter>\n\nJob:\n<jd>\n${state.flow.jd}\n</jd>\n${state.resume?'\nResume context: '+state.resume.slice(0,600)+'\n':''}\nFeedback:\n<feedback>\n${allFeedback}\n</feedback>\n\nApply feedback precisely. Keep what works. Output only the revised cover letter.`;
  const out=document.getElementById('flow-cov-output');
  out.style.whiteSpace='pre-wrap';
  const result=await callClaude(system,prompt,out);
  if(result){ state.flow.coverLetter=result; addCoverVersion(result,versionLabel); document.getElementById('flow-cov-cta').style.display='flex'; clearFeedback(); }
  btn.disabled=false; btn.innerHTML='↻ Regenerate with Feedback';
};
</script>


<script>

          </div>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div style="flex:1;height:1px;background:var(--border)"></div><span style="font-size:0.72rem;color:var(--text-dim);flex-shrink:0">or fill in manually</span><div style="flex:1;height:1px;background:var(--border)"></div></div>`:''}
        <div class="two-col">
          <div class="field"><div class="field-label">Company</div><input type="text" id="out-company" placeholder="e.g. Notion" value="${linkedApp?.company||state.flow?.company||''}" /></div>
          <div class="field"><div class="field-label">Role Title</div><input type="text" id="out-role" placeholder="e.g. Sr. PM - Growth" value="${linkedApp?.role||state.flow?.roleTitle||''}" /></div>

        <div class="field"><div class="field-label">Job Description <span style="color:var(--text-dim)">(for personalization)</span></div><textarea id="out-jd" rows="4" placeholder="Paste JD...">${linkedApp?.jd||state.flow?.jd||''}</textarea></div>
        <div class="field"><div class="field-label">What do you know about this company? <span style="color:var(--text-dim)">(optional)</span></div><input type="text" id="out-context" placeholder="e.g. Just raised Series B, expanding marketplace ops..." /></div>
      </div>
      <div class="card">
        <div class="card-title">👤 Contact Details</div>
        <div class="flag info" style="margin-bottom:14px">💡 Claude will tell you exactly who to search for on LinkedIn. Fill in what you know — even partial info helps personalize the message.</div>
        <div class="two-col">
          <div class="field"><div class="field-label">Contact Name <span style="color:var(--text-dim)">(if found)</span></div><input type="text" id="out-name" placeholder="e.g. Sarah Chen" /></div>
          <div class="field"><div class="field-label">Contact Title <span style="color:var(--text-dim)">(if known)</span></div><input type="text" id="out-title" placeholder="e.g. Head of Product Operations" /></div>
        </div>

          <div class="field-label">Outreach Channel</div>

            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:0.85rem"><input type="checkbox" id="out-ch-linkedin" checked style="accent-color:var(--accent)" /> LinkedIn DM</label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:0.85rem"><input type="checkbox" id="out-ch-connection" style="accent-color:var(--accent)" /> Connection Note</label>

          <div id="out-targeting" style="font-family:'DM Sans',sans-serif;font-size:0.83rem"></div>
        </div>
        <div id="out-email-wrap" style="display:none"><div class="card"><div class="card-title">📧 Cold Email <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-muted)">SUBJECT LINE INCLUDED</span></div><div class="output-area" id="out-email" style="white-space:pre-wrap"></div><div class="copy-row"><button class="btn btn-secondary btn-sm" onclick="copyText('out-email')">Copy</button></div></div></div>

        <div id="out-connection-wrap" style="display:none"><div class="card"><div class="card-title">🤝 Connection Note <span style="color:var(--text-muted)">~200 char limit</span></div><div class="output-area" id="out-connection" style="white-space:pre-wrap"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><span id="out-conn-charcount" style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-muted)"></span><button class="btn btn-secondary btn-sm" onclick="copyText('out-connection')">Copy</button></div></div></div>
        <div class="card" style="border-color:rgba(89,165,216,0.3)">
          <div class="card-title">🔄 Refine Outreach</div>
          <div class="field"><textarea id="out-feedback" rows="2" placeholder="e.g. Make the email shorter, lead with the marketplace ops angle..."></textarea></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${['Shorter & punchier','More personal','Less formal','Focus on shared background','More direct ask'].map(t=>`<button class="tone-preset-btn" onclick="this.classList.toggle('selected');addOutreachPreset(this,'${t}')">${t}</button>`).join('')}</div>
          <button class="btn-flow" onclick="refineOutreach()">↻ Refine</button>
        </div>
        <div class="card" id="out-log-card" style="border-color:rgba(126,203,161,0.3);background:linear-gradient(135deg,rgba(126,203,161,0.04) 0%,var(--surface) 100%)">
          <div class="card-title">📋 Log This Outreach to Tracker</div>
          <div id="out-log-status" style="font-size:0.82rem;color:var(--text-muted);margin-bottom:14px">${linkedApp?`<span style="color:var(--success)">✓ Will log to: <strong style="color:var(--text)">${linkedApp.company} — ${linkedApp.role}</strong></span>`:'<span style="color:var(--text-muted)">Not linked to an application — select one above or it will create a new entry.</span>'}</div>
          <div class="two-col">
            <div class="field"><div class="field-label">Contact Name</div><input type="text" id="log-contact-name" placeholder="e.g. Sarah Chen" /></div>
            <div class="field"><div class="field-label">Their Title</div><input type="text" id="log-contact-title" placeholder="e.g. Head of Product Ops" /></div>
          </div>
          <div class="two-col">
            <div class="field"><div class="field-label">Email</div><input type="email" id="log-contact-email" placeholder="sarah@company.com" /></div>
            <div class="field"><div class="field-label">LinkedIn URL</div><input type="url" id="log-contact-linkedin" placeholder="linkedin.com/in/sarahchen" /></div>
          </div>
          <div class="two-col">
            <div class="field"><div class="field-label">Channel Used</div>
              <select id="log-contact-channel" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;width:100%;font-family:'DM Sans',sans-serif;font-size:0.83rem">
                <option>LinkedIn DM</option><option>Email</option><option>LinkedIn Connection</option><option>Phone</option><option>Referral</option><option>In Person</option><option>Other</option>
              </select>
            </div>
            <div class="field"><div class="field-label">Date Contacted</div><input type="date" id="log-contact-date" value="${new Date().toISOString().split('T')[0]}" /></div>
          </div>
          <div class="field"><div class="field-label">Note <span style="color:var(--text-dim)">(optional)</span></div><input type="text" id="log-contact-note" placeholder="e.g. Sent cold email via Hunter.io address, waiting on reply..." /></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="logOutreachToTracker()" id="log-outreach-btn">📋 Log to App Tracker</button>
            <button class="btn btn-secondary" onclick="showModule('tracker')" style="font-size:0.82rem">View Tracker →</button>
          </div>
          <div id="log-outreach-confirm" style="display:none;margin-top:12px"></div>
        </div>
      </div>
    </div>`;
  // Sync contact detail fields to log fields
  setTimeout(() => {
    [['out-name','log-contact-name'],['out-title','log-contact-title'],['out-email-addr','log-contact-email'],['out-linkedin-url','log-contact-linkedin']].forEach(([src,dst]) => {
      const s=document.getElementById(src), d=document.getElementById(dst);
      if(s&&d) s.addEventListener('input',()=>d.value=s.value);
    });
  },100);
};

window.selectLinkedApp = function(id) {

  (state.applications||[]).forEach(a => {
    const row=document.getElementById(`app-link-${a.id}`), dot=document.getElementById(`app-link-dot-${a.id}`);
    if(row) row.style.borderColor=a.id===id?'var(--accent)':'var(--border)';

  });
  const noneRow=document.getElementById('app-link-none'), noneDot=document.getElementById('app-link-dot-none');
  if(noneRow) noneRow.style.borderColor=id===null?'var(--accent)':'var(--border)';
  if(noneDot) noneDot.style.background=id===null?'var(--accent)':'var(--border)';
  const statusEl=document.getElementById('out-log-status');
  if(statusEl){
    if(id){ const app=(state.applications||[]).find(a=>a.id===id);
      statusEl.innerHTML=`<span style="color:var(--success)">✓ Will log to: <strong style="color:var(--text)">${app?.company} — ${app?.role}</strong></span>`;
      const compEl=document.getElementById('out-company'), roleEl=document.getElementById('out-role'), jdEl=document.getElementById('out-jd');
      if(compEl&&app) compEl.value=app.company||''; if(roleEl&&app) roleEl.value=app.role||''; if(jdEl&&app) jdEl.value=app.jd||'';
    } else { statusEl.innerHTML='<span style="color:var(--text-muted)">Not linked — will create a new application entry.</span>'; }

};

window.addOutreachPreset = function(btn, val) {
  if (!window._outreachPresets) window._outreachPresets = [];
  const idx=window._outreachPresets.indexOf(val);
  if(idx===-1) window._outreachPresets.push(val); else window._outreachPresets.splice(idx,1);
};

window.renderTargetingOutput = function(rawText) {
  const container = document.getElementById('out-targeting');
  if (!container) return;
  const sectionDefs = [
    {key:'1',icon:'🎯',label:'Best Person to Contact',color:'#ffc15e',bg:'rgba(255,193,94,0.06)',border:'rgba(255,193,94,0.2)'},
    {key:'2',icon:'🔍',label:'LinkedIn Search Strings',color:'#59a5d8',bg:'rgba(89,165,216,0.06)',border:'rgba(89,165,216,0.2)'},
    {key:'3',icon:'📋',label:'Recruiter to Also Contact',color:'#85756e',bg:'rgba(133,117,110,0.06)',border:'rgba(133,117,110,0.2)'},
    {key:'4',icon:'💡',label:'What to Reference',color:'#7ecba1',bg:'rgba(126,203,161,0.06)',border:'rgba(126,203,161,0.2)'},
  ];
  const sectionRegex = /##\s*\d+\.\s*([^\n]+)\n([\s\S]*?)(?=\n##\s*\d+\.|\s*$)/g;
  const parsed = {}; let match; let count=0;
  while ((match = sectionRegex.exec(rawText)) !== null) { count++; parsed[String(count)] = {title:match[1].trim().replace(/\*/g,''), body:match[2].trim()}; }
  if (Object.keys(parsed).length===0) {
    container.style.whiteSpace='pre-wrap';
    container.innerHTML=rawText.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:\'DM Mono\',monospace;font-size:0.78rem">$1</code>');
    return;
  }
  const formatBody = body => body
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="display:inline-block;background:var(--surface);border:1px solid var(--border);padding:3px 10px;border-radius:6px;font-family:\'DM Mono\',monospace;font-size:0.78rem;color:var(--accent);margin:2px 0">$1</code>')
    .replace(/^\d+\.\s+(.+)$/gm,'<div style="display:flex;gap:8px;margin:6px 0;align-items:flex-start"><span style="font-family:\'DM Mono\',monospace;font-size:0.65rem;color:var(--text-dim);flex-shrink:0;margin-top:2px">→</span><span>$1</span></div>')
    .replace(/^[-•]\s+(.+)$/gm,'<div style="display:flex;gap:8px;margin:4px 0;align-items:flex-start"><span style="color:var(--accent);flex-shrink:0">·</span><span>$1</span></div>')
    .replace(/\n{2,}/g,'<div style="height:6px"></div>').replace(/\n/g,'<br>');
  container.style.whiteSpace='normal';
  container.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">${sectionDefs.map(def=>{const sec=parsed[def.key];if(!sec)return'';return`<div style="border:1px solid ${def.border};border-radius:10px;overflow:hidden"><div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:${def.bg};border-bottom:1px solid ${def.border}"><span style="font-size:1rem">${def.icon}</span><span style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:${def.color};letter-spacing:0.02em">${def.label}</span></div><div style="padding:12px 14px;font-size:0.82rem;line-height:1.7;color:var(--text-muted)">${formatBody(sec.body)}</div></div>`;}).join('')}</div>`;
};

window.runOutreach = async function() {
  const company=document.getElementById('out-company')?.value.trim()||'';
  const role=document.getElementById('out-role')?.value.trim()||'';
  const jd=document.getElementById('out-jd')?.value.trim()||'';
  const context=document.getElementById('out-context')?.value.trim()||'';
  const contactName=document.getElementById('out-name')?.value.trim()||'';
  const contactTitle=document.getElementById('out-title')?.value.trim()||'';
  const wantEmail=document.getElementById('out-ch-email')?.checked;
  const wantLinkedIn=document.getElementById('out-ch-linkedin')?.checked;
  const wantConnection=document.getElementById('out-ch-connection')?.checked;
  if(!company&&!jd){alert('Please enter at least a company name or job description.');return;}
  const btn=document.getElementById('out-btn'); btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Generating...';
  document.getElementById('out-output-wrap').style.display='block';
  const system=`You are an expert at cold outreach for job seekers. You write messages that are short, specific, human, and get replies.\n\nCandidate:\n- Name: ${state.profile?.name||'the candidate'}\n- Level: ${state.profile?.level||'Senior Manager/Director'}\n- Background: ${state.profile?.industries||''}\n- Skills: ${state.profile?.skills||''}\n- Location: ${state.profile?.location||'NYC'}${state.resume?'\nResume summary: '+state.resume.slice(0,600):''}`;
  const targetingEl=document.getElementById('out-targeting');
  targetingEl.innerHTML='<span class="cursor"></span>';
  const targetingResult = await callClaude(system,`For a ${state.profile?.level||'Senior Manager'} candidate applying to "${role||'this role'}" at ${company||'this company'}, give exactly these 4 sections:\n\n## 1. BEST PERSON TO CONTACT\nList 2-3 specific job titles. Separate into **Primary targets** and **Secondary targets**.\n\n## 2. LINKEDIN SEARCH STRINGS\n**Primary:** \`[exact search string]\`\n**Secondary:** \`[alternate search]\`\n\n## 3. RECRUITER TO ALSO CONTACT\nThe title of the recruiter likely handling this role.\n\n## 4. WHAT TO REFERENCE\n2 specific things to mention showing research — real things about this company/role.\n\n${jd?'JD: '+jd.slice(0,600):''}${context?'\nCompany context: '+context:''}`,targetingEl);
  if(targetingResult) renderTargetingOutput(targetingResult);
  if(wantEmail){
    document.getElementById('out-email-wrap').style.display='block';
    await callClaude(system,`Write a cold email from ${state.profile?.name||'the candidate'} to ${contactName?(contactName+(contactTitle?', '+contactTitle:'')):'the hiring manager'} at ${company||'the company'} about the ${role||'open role'}.\n\nRules: Subject line specific, not generic. 4-6 sentences max. Lead with one specific thing. One relevant achievement. Soft ask for 15-min call. No filler openers.\n\nFormat:\nSubject: [subject]\n\n[body]\n\n${jd?'JD: '+jd.slice(0,500):''}${context?'\nContext: '+context:''}${state.resume?'\nBackground: '+state.resume.slice(0,400):''}`,document.getElementById('out-email'));
  }
  if(wantLinkedIn){
    document.getElementById('out-linkedin-wrap').style.display='block';
    const liOut=document.getElementById('out-linkedin');
    await callClaude(system,`Write a LinkedIn DM to ${contactName||'the hiring manager'} at ${company||'the company'}. STRICT 300 character limit. Hook first line. One specific company mention. One relevance line. Soft ask. Casual tone. Output only the DM.\n\n${context?'Context: '+context:''}${state.resume?'\nBackground: '+state.resume.slice(0,300):''}`,liOut);
    setTimeout(()=>{const txt=liOut.textContent;const countEl=document.getElementById('out-li-charcount');if(countEl){const c=txt.length;countEl.textContent=`${c} chars ${c<=300?'✓ fits limit':'⚠ '+(c-300)+' over limit'}`;countEl.style.color=c<=300?'var(--success)':'var(--accent3)';}},200);
  }
  if(wantConnection){
    document.getElementById('out-connection-wrap').style.display='block';
    const connOut=document.getElementById('out-connection');
    await callClaude(system,`Write a LinkedIn connection note. STRICT 200 character limit. Specific about why connecting. Reference company or role. Warm, human. Fragments fine. Output only the note.\n\nCompany: ${company||''} Role: ${role||''}`,connOut);
    setTimeout(()=>{const txt=connOut.textContent;const countEl=document.getElementById('out-conn-charcount');if(countEl){const c=txt.length;countEl.textContent=`${c} chars ${c<=200?'✓ fits limit':'⚠ '+(c-200)+' over limit'}`;countEl.style.color=c<=200?'var(--success)':'var(--accent3)';}},200);
  }
  btn.disabled=false; btn.innerHTML='<span>Regenerate</span>';
};

window.refineOutreach = async function() {
  const feedback=document.getElementById('out-feedback')?.value.trim()||'';
  const presets=(window._outreachPresets||[]).join(', ');
  if(!feedback&&!presets){alert('Add feedback or select a preset first.');return;}
  const instructions=[presets,feedback].filter(Boolean).join('. ');
  const system=`You are an expert at refining cold outreach. Apply requested changes precisely while keeping what works.`;
  if(document.getElementById('out-email-wrap')?.style.display!=='none'){
    const current=document.getElementById('out-email')?.textContent||'';
    const emailEl=document.getElementById('out-email'); emailEl.innerHTML='<span class="cursor"></span>'; emailEl.classList.add('loading');
    await callClaude(system,`Refine this cold email. Keep what works, only change what's asked.\n\nCurrent email:\n${current}\n\nFeedback: ${instructions}\n\nOutput revised email only.`,emailEl);
  }
  if(document.getElementById('out-linkedin-wrap')?.style.display!=='none'){
    const current=document.getElementById('out-linkedin')?.textContent||'';
    const liEl=document.getElementById('out-linkedin'); liEl.innerHTML='<span class="cursor"></span>'; liEl.classList.add('loading');
    await callClaude(system,`Refine this LinkedIn DM. Keep under 300 chars.\n\nCurrent:\n${current}\n\nFeedback: ${instructions}\n\nOutput revised DM only.`,liEl);
    setTimeout(()=>{const txt=liEl.textContent;const c=txt.length;const countEl=document.getElementById('out-li-charcount');if(countEl){countEl.textContent=`${c} chars ${c<=300?'✓ fits':'⚠ '+(c-300)+' over'}`;countEl.style.color=c<=300?'var(--success)':'var(--accent3)';}},200);
  }
};

window.logOutreachToTracker = function() {
  const name=document.getElementById('log-contact-name')?.value.trim()||'';
  const title=document.getElementById('log-contact-title')?.value.trim()||'';
  const email=document.getElementById('log-contact-email')?.value.trim()||'';
  const liUrl=document.getElementById('log-contact-linkedin')?.value.trim()||'';
  const channel=document.getElementById('log-contact-channel')?.value||'LinkedIn DM';
  const date=document.getElementById('log-contact-date')?.value||new Date().toISOString().split('T')[0];
  const note=document.getElementById('log-contact-note')?.value.trim()||'';
  if(!name&&!title){alert('Please enter at least a contact name or title before logging.');return;}
  const contact={cid:Date.now(),name:name||'(unnamed)',title,email,linkedinUrl:liUrl,channel,date,note,followedUp:false,source:'outreach'};
  if(!state.applications) state.applications=[];
  let targetApp=null;
  const linkedId=window._linkedAppId;
  if(linkedId){
    targetApp=(state.applications||[]).find(a=>a.id===linkedId);
    if(targetApp){if(!targetApp.contacts)targetApp.contacts=[];targetApp.contacts.unshift(contact);if(targetApp.status==='To Apply')targetApp.status='Outreach Sent';}
  } else {
    const company=document.getElementById('out-company')?.value.trim()||'Unknown Company';
    const role=document.getElementById('out-role')?.value.trim()||'Unknown Role';
    const jd=document.getElementById('out-jd')?.value.trim()||'';
    targetApp={id:Date.now()+1,company,role,jd,status:'Outreach Sent',notes:`Outreach sent to ${contact.name}${contact.title?' ('+contact.title+')':''}`,contacts:[contact],analysisResult:'',tailoredResume:'',coverLetter:'',rescoreResult:'',rescoreResume:'',stage:'outreach',dateAdded:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
    state.applications.unshift(targetApp);
    window._linkedAppId=targetApp.id;
  }
  const confirmEl=document.getElementById('log-outreach-confirm');
  const btn=document.getElementById('log-outreach-btn');
  const channelIcon={Email:'📧','LinkedIn DM':'💬','LinkedIn Connection':'🤝',Phone:'📞',Referral:'👋','In Person':'🤝',Other:'💬'}[channel]||'💬';
  if(confirmEl){
    confirmEl.style.display='block';
    confirmEl.innerHTML=`<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(126,203,161,0.08);border:1px solid rgba(126,203,161,0.3);border-radius:10px"><div style="font-size:1.3rem">✅</div><div style="flex:1"><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;margin-bottom:4px">Contact logged to ${targetApp.company}</div><div style="font-size:0.78rem;color:var(--text-muted);line-height:1.6">${channelIcon} <strong>${contact.name}${contact.title?' · '+contact.title:''}</strong> via ${channel}${email?'<br>📧 '+email:''}${liUrl?'<br>🔗 <a href="'+(liUrl.startsWith('http')?liUrl:'https://'+liUrl)+'" target="_blank" style="color:var(--accent2)">'+liUrl+'</a>':''}<br>📅 ${date}${note?'<br>💬 "'+note+'"':''}</div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="showModule('tracker')">View in Tracker →</button><button class="btn btn-secondary btn-sm" onclick="logAnotherContact()">+ Log Another Contact</button></div></div></div>`;
  }
  if(btn){btn.textContent='✓ Logged';btn.style.background='rgba(126,203,161,0.15)';btn.style.borderColor='rgba(126,203,161,0.4)';btn.style.color='#7ecba1';setTimeout(()=>{btn.textContent='📋 Log Another Contact';btn.style.background='';btn.style.borderColor='';btn.style.color='';btn.onclick=logAnotherContact;},2000);}
  showToast('✓ Contact logged → '+targetApp.company);
};

window.logAnotherContact = function() {
  ['log-contact-name','log-contact-title','log-contact-email','log-contact-linkedin','log-contact-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const confirmEl=document.getElementById('log-outreach-confirm');if(confirmEl)confirmEl.style.display='none';
  const btn=document.getElementById('log-outreach-btn');if(btn){btn.textContent='📋 Log to App Tracker';btn.onclick=logOutreachToTracker;}
  document.getElementById('out-log-card')?.scrollIntoView({behavior:'smooth',block:'start'});
};
</script>


<script>
// ═══ MODULE: APP TRACKER + CONTACT LOG ═══════════════════════════════════════
window.renderAppTracker = function() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav=document.getElementById('nav-tracker'); if(nav) nav.classList.add('active');
  const apps=state.applications||[];
  const statuses=['To Apply','Applied','Outreach Sent','Interview','Offer','Rejected','Archived'];
  const statusColors={
    'To Apply':      {bg:'rgba(89,165,216,0.1)', border:'rgba(89,165,216,0.3)', text:'#59a5d8'},
    'Applied':       {bg:'rgba(255,193,94,0.1)', border:'rgba(255,193,94,0.3)', text:'#ffc15e'},
    'Outreach Sent': {bg:'rgba(224,251,252,0.08)',border:'rgba(224,251,252,0.2)',text:'#e0fbfc'},
    'Interview':     {bg:'rgba(126,203,161,0.1)', border:'rgba(126,203,161,0.3)',text:'#7ecba1'},
    'Offer':         {bg:'rgba(126,203,161,0.2)', border:'rgba(126,203,161,0.5)',text:'#7ecba1'},
    'Rejected':      {bg:'rgba(224,122,95,0.08)', border:'rgba(224,122,95,0.25)',text:'#e07a5f'},
    'Archived':      {bg:'rgba(133,117,110,0.08)',border:'rgba(133,117,110,0.2)', text:'#85756e'}
  };
  const sc={}; statuses.forEach(s=>sc[s]=(apps.filter(a=>a.status===s).length));
  const activeApps=apps.filter(a=>a.status!=='Archived'&&a.status!=='Rejected');
  window._trackerStatusColors=statusColors; window._trackerStatuses=statuses;
  const el=document.getElementById('main-content');
  el.innerHTML=`

window.renderAppCard = function(app, statusColors, statuses) {

  const analysisMatch=app.analysisResult?.match(/Overall:\s*(\d+)\/100/i);
  const atsScore=rescoreMatch?rescoreMatch[1]:(analysisMatch?analysisMatch[1]:null);
  const atsIsRescore=!!rescoreMatch;
  return `<div class="app-card" id="app-${app.id}" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">
