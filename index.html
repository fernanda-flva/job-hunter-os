          ${atsScore?`<div title="${atsIsRescore?'Re-scored':'From analysis'}" style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--accent);border:1px solid rgba(255,193,94,0.3);padding:2px 7px;border-radius:10px">${atsIsRescore?'📊 ':''} ATS ${atsScore}/100${atsIsRescore?' <span style="font-size:0.55rem;opacity:0.7">re-scored</span>':''}</div>`:''}
          ${pendingFollowUp>0?`<div id="followup-dot-${app.id}" style="display:inline-block;background:rgba(224,122,95,0.15);border:1px solid rgba(224,122,95,0.4);border-radius:10px;padding:2px 7px;font-family:'DM Mono',monospace;font-size:0.58rem;color:#e07a5f">↪ ${pendingFollowUp} follow-up${pendingFollowUp>1?'s':''}</div>`:`<div id="followup-dot-${app.id}" style="display:none"></div>`}
        </div>
        <div style="font-size:0.83rem;color:var(--text-muted);margin-bottom:8px">${app.role||'Unknown Role'}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${hasAnalysis?'<span class="pill blue">📊 Analyzed</span>':''}
          ${hasResume?'<span class="pill yellow">📄 Resume</span>':''}
          ${hasCover?'<span class="pill green">✉️ Cover</span>':''}
          ${app.rescoreResult?'<span class="pill" style="background:rgba(255,193,94,0.1);color:var(--accent);border:1px solid rgba(255,193,94,0.25)">📊 Re-scored</span>':''}
          ${contacts.length>0?`<span class="pill" style="background:rgba(133,117,110,0.12);color:#85756e;border:1px solid rgba(133,117,110,0.25)">👤 <span id="contact-badge-${app.id}">${contacts.length}</span> contact${contacts.length>1?'s':''}</span>`:`<span id="contact-badge-${app.id}" style="display:none"></span>`}
        </div>
        ${app.notes?`<div style="margin-top:8px;font-size:0.78rem;color:var(--text-muted);font-style:italic">${app.notes}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <select onchange="updateAppStatus(${app.id},this.value)" style="background:${sc.bg};border:1px solid ${sc.border};color:${sc.text};border-radius:20px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:600;cursor:pointer;letter-spacing:0.05em;outline:none">
          ${statuses.map(s=>`<option value="${s}" ${s===app.status?'selected':''}>${s}</option>`).join('')}
        </select>
        <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim)">${app.dateAdded}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          <button class="btn btn-secondary btn-sm" onclick="toggleContactLog(${app.id})" id="contact-log-btn-${app.id}" style="font-size:0.7rem;padding:5px 10px">👤 Contacts</button>
          <button class="btn btn-secondary btn-sm" onclick="expandApp(${app.id})" style="font-size:0.7rem;padding:5px 10px">View Content</button>
          <button class="btn btn-secondary btn-sm" onclick="editAppNotes(${app.id})" style="font-size:0.7rem;padding:5px 10px">Notes</button>
          <button class="btn btn-secondary btn-sm" onclick="deleteApp(${app.id})" style="font-size:0.7rem;padding:5px 10px;color:var(--accent3);border-color:rgba(224,122,95,0.3)">✕</button>
        </div>
      </div>
    </div>
    <div id="contact-log-${app.id}" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;margin-bottom:14px">👤 Contact Log</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
        <div style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">Log New Contact</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="field" style="margin-bottom:0"><div class="field-label">Name</div><input type="text" id="c-name-${app.id}" placeholder="e.g. Sarah Chen" style="font-size:0.8rem" /></div>
          <div class="field" style="margin-bottom:0"><div class="field-label">Title / Role</div><input type="text" id="c-title-${app.id}" placeholder="e.g. Head of Product Ops" style="font-size:0.8rem" /></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="field" style="margin-bottom:0"><div class="field-label">Channel</div>
            <select id="c-channel-${app.id}" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;width:100%;font-family:'DM Sans',sans-serif;font-size:0.8rem">
              <option>LinkedIn DM</option><option>Email</option><option>LinkedIn Connection</option><option>Phone</option><option>Referral</option><option>In Person</option><option>Other</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0"><div class="field-label">Date Contacted</div><input type="date" id="c-date-${app.id}" value="${new Date().toISOString().split('T')[0]}" /></div>
        </div>
        <div class="field" style="margin-bottom:10px"><div class="field-label">Note <span style="color:var(--text-dim)">(optional)</span></div><input type="text" id="c-note-${app.id}" placeholder="e.g. Sent email, waiting for reply..." style="font-size:0.8rem" /></div>
        <button class="btn btn-primary btn-sm" onclick="addContactEntry(${app.id})">+ Log Contact</button>
      </div>
      <div id="contact-list-${app.id}"><div style="font-size:0.78rem;color:var(--text-dim);padding:8px 0">No contacts logged yet.</div></div>
    </div>
    <div id="app-expand-${app.id}" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="tabs" style="margin-bottom:16px">
        ${hasAnalysis?`<div class="tab active" onclick="switchAppTab(${app.id},'analysis',this)">Analysis</div>`:''}
        ${app.rescoreResult?`<div class="tab" onclick="switchAppTab(${app.id},'rescore',this)">Re-Score</div>`:''}
        ${hasResume?`<div class="tab ${!hasAnalysis?'active':''}" onclick="switchAppTab(${app.id},'resume',this)">Resume</div>`:''}
        ${hasCover?`<div class="tab" onclick="switchAppTab(${app.id},'cover',this)">Cover Letter</div>`:''}
        ${app.jd?`<div class="tab" onclick="switchAppTab(${app.id},'jd',this)">JD</div>`:''}
      </div>
      <div id="app-tab-${app.id}" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:0.82rem;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;color:var(--text)">
        ${hasAnalysis?app.analysisResult:hasResume?app.tailoredResume:app.coverLetter||''}
      </div>
      <div class="copy-row">
        <button class="btn btn-secondary btn-sm" id="app-copy-${app.id}" onclick="copyAppTab(${app.id})">Copy</button>
        ${hasResume||hasCover?`<button class="btn btn-secondary btn-sm" onclick="continueFromApp(${app.id})">Continue in Flow →</button>`:''}
      </div>
    </div>
  </div>`;
};

window.filterTracker = function() {
  const search=(document.getElementById('tracker-search')?.value||'').toLowerCase();
  const filter=document.getElementById('tracker-filter')?.value||'all';
  const apps=state.applications||[];
  const filtered=apps.filter(a=>{
    const matchSearch=!search||(a.company||'').toLowerCase().includes(search)||(a.role||'').toLowerCase().includes(search);
    const matchStatus=filter==='all'||a.status===filter;
    return matchSearch&&matchStatus;
  });
  const list=document.getElementById('tracker-list'); if(!list) return;
  if(filtered.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-dim)">No applications match your filter.</div>';return;}
  list.innerHTML=filtered.map(a=>renderAppCard(a,window._trackerStatusColors,window._trackerStatuses)).join('');
};

window.updateAppStatus = function(id,newStatus) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  app.status=newStatus;
  const sc=(window._trackerStatusColors||{})[newStatus]||{};
  const sel=document.querySelector(`#app-${id} select`);
  if(sel&&sc.bg){sel.style.background=sc.bg;sel.style.borderColor=sc.border;sel.style.color=sc.text;}
  showToast('✓ '+app.company+' → '+newStatus);
};

window.expandApp = function(id) {
  const wrap=document.getElementById(`app-expand-${id}`); if(!wrap) return;
  const isOpen=wrap.style.display!=='none';
  wrap.style.display=isOpen?'none':'block';
  const btn=document.querySelector(`#app-${id} button[onclick*="expandApp"]`);
  if(btn) btn.textContent=isOpen?'View Content':'Hide Content';
};

window.switchAppTab = function(id,tab,btn) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  const content={analysis:app.analysisResult,rescore:app.rescoreResult,resume:app.tailoredResume,cover:app.coverLetter,jd:app.jd};
  const tabEl=document.getElementById(`app-tab-${id}`); if(tabEl) tabEl.textContent=content[tab]||'(No content)';
  document.querySelectorAll(`#app-expand-${id} .tab`).forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
};

window.copyAppTab = function(id) {
  const tabEl=document.getElementById(`app-tab-${id}`); if(!tabEl) return;
  navigator.clipboard.writeText(tabEl.textContent).then(()=>{const btn=document.getElementById(`app-copy-${id}`);if(btn){btn.textContent='✓ Copied';setTimeout(()=>btn.textContent='Copy',1500);}});
};

window.editAppNotes = function(id) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  const card=document.getElementById(`app-${id}`);
  const existing=document.getElementById(`notes-edit-${id}`);
  if(existing){existing.remove();return;}
  const notesDiv=document.createElement('div'); notesDiv.id=`notes-edit-${id}`;
  notesDiv.style.cssText='margin-top:10px;padding-top:10px;border-top:1px solid var(--border)';
  notesDiv.innerHTML=`<div class="field-label" style="margin-bottom:6px">Notes</div><textarea id="notes-input-${id}" rows="2" style="width:100%;font-size:0.82rem">${app.notes||''}</textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-primary btn-sm" onclick="saveAppNotes(${id})">Save</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('notes-edit-${id}').remove()">Cancel</button></div>`;
  card.appendChild(notesDiv);
};

window.saveAppNotes = function(id) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  app.notes=document.getElementById(`notes-input-${id}`)?.value||'';
  document.getElementById(`notes-edit-${id}`)?.remove();
  showToast('✓ Notes saved');
};

window.deleteApp = function(id) {
  if(!confirm('Remove this application from your tracker?')) return;
  state.applications=(state.applications||[]).filter(a=>a.id!==id);
  renderAppTracker();
  showToast('Application removed');
};

window.continueFromApp = function(id) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  state.flow={active:true,jd:app.jd,company:app.company,roleTitle:app.role,analysisResult:app.analysisResult,tailoredResume:app.tailoredResume,coverLetter:app.coverLetter,rescoreResult:app.rescoreResult||'',rescoreResume:app.rescoreResume||'',step:'cover',coverVersions:[],selectedPresets:[]};
  showFlowStep('cover');
};

window.showAddAppModal = function() {
  document.getElementById('add-app-modal')?.remove();
  const modal=document.createElement('div'); modal.id='add-app-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:20px">➕ Add Application Manually</div><div class="two-col"><div class="field"><div class="field-label">Company *</div><input type="text" id="m-company" placeholder="e.g. Notion" /></div><div class="field"><div class="field-label">Role Title *</div><input type="text" id="m-role" placeholder="e.g. Director of Product Ops" /></div></div><div class="field"><div class="field-label">Status</div><select id="m-status" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;width:100%;font-family:'DM Sans',sans-serif;font-size:0.85rem">${['To Apply','Applied','Outreach Sent','Interview','Offer','Rejected','Archived'].map(s=>`<option>${s}</option>`).join('')}</select></div><div class="field"><div class="field-label">Notes</div><textarea id="m-notes" rows="2" placeholder="Any notes..."></textarea></div><div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-primary" onclick="saveManualApp()">Add Application</button><button class="btn btn-secondary" onclick="document.getElementById('add-app-modal').remove()">Cancel</button></div></div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
};

window.saveManualApp = function() {
  const company=document.getElementById('m-company')?.value.trim()||'';
  const role=document.getElementById('m-role')?.value.trim()||'';
  if(!company||!role){alert('Company and Role are required.');return;}
  const app={id:Date.now(),company,role,status:document.getElementById('m-status')?.value||'To Apply',notes:document.getElementById('m-notes')?.value||'',jd:'',analysisResult:'',tailoredResume:'',coverLetter:'',rescoreResult:'',rescoreResume:'',contacts:[],stage:'manual',dateAdded:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
  if(!state.applications) state.applications=[];
  state.applications.unshift(app);
  document.getElementById('add-app-modal')?.remove();
  renderAppTracker();
  showToast('✓ '+company+' — '+role+' added');
};

window.toggleContactLog = function(id) {
  const wrap=document.getElementById(`contact-log-${id}`), btn=document.getElementById(`contact-log-btn-${id}`);
  if(!wrap) return;
  const isOpen=wrap.style.display!=='none';
  wrap.style.display=isOpen?'none':'block';
  if(btn) btn.textContent=isOpen?'👤 Contacts':'👤 Hide Contacts';
  if(!isOpen) renderContactList(id);
};

window.addContactEntry = function(id) {
  const app=(state.applications||[]).find(a=>a.id===id); if(!app) return;
  if(!app.contacts) app.contacts=[];
  const name=document.getElementById(`c-name-${id}`)?.value.trim()||'';
  const title=document.getElementById(`c-title-${id}`)?.value.trim()||'';
  const channel=document.getElementById(`c-channel-${id}`)?.value||'LinkedIn DM';
  const date=document.getElementById(`c-date-${id}`)?.value||new Date().toISOString().split('T')[0];
  const note=document.getElementById(`c-note-${id}`)?.value.trim()||'';
  if(!name&&!title){alert('Add at least a name or title.');return;}
  app.contacts.unshift({cid:Date.now(),name:name||'(unnamed)',title,email:'',linkedinUrl:'',channel,date,note,followedUp:false});
  renderContactList(id);
  ['c-name-','c-title-','c-note-'].forEach(p=>{const el=document.getElementById(p+id);if(el)el.value='';});
  showToast('✓ Contact logged for '+app.company);
};

window.deleteContact = function(appId,cid) {
  const app=(state.applications||[]).find(a=>a.id===appId); if(!app) return;
  app.contacts=(app.contacts||[]).filter(c=>c.cid!==cid);
  renderContactList(appId);
};

window.toggleFollowUp = function(appId,cid) {
  const app=(state.applications||[]).find(a=>a.id===appId); if(!app) return;
  const contact=(app.contacts||[]).find(c=>c.cid===cid); if(!contact) return;
  contact.followedUp=!contact.followedUp;
  renderContactList(appId);
};

window.renderContactList = function(id) {
  const app=(state.applications||[]).find(a=>a.id===id);
  const listEl=document.getElementById(`contact-list-${id}`);
  if(!listEl||!app) return;
  const channelIcons={Email:'📧',LinkedIn:'💼','LinkedIn DM':'💬','LinkedIn Connection':'🤝',Phone:'📞',Referral:'👋','In Person':'🤝',Other:'💬'};
  const contacts=app.contacts||[];
  if(contacts.length===0){listEl.innerHTML='<div style="font-size:0.78rem;color:var(--text-dim);padding:8px 0">No contacts logged yet.</div>';const badge=document.getElementById(`contact-badge-${id}`);if(badge)badge.style.display='none';return;}
  listEl.innerHTML=contacts.map(c=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.82rem"><div style="font-size:1.1rem;flex-shrink:0;margin-top:1px">${channelIcons[c.channel]||'💬'}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><strong style="color:var(--text)">${c.name}</strong>${c.title?`<span style="font-size:0.72rem;color:var(--text-muted)">${c.title}</span>`:''}<span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--accent2);border:1px solid rgba(89,165,216,0.3);padding:1px 7px;border-radius:10px">${c.channel}</span><span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);margin-left:auto">${c.date}</span></div>${(c.email||c.linkedinUrl)?`<div style="margin-top:4px;display:flex;gap:10px;flex-wrap:wrap">${c.email?`<a href="mailto:${c.email}" style="font-size:0.72rem;color:var(--accent2);text-decoration:none">📧 ${c.email}</a>`:''}${c.linkedinUrl?`<a href="${c.linkedinUrl.startsWith('http')?c.linkedinUrl:'https://'+c.linkedinUrl}" target="_blank" style="font-size:0.72rem;color:var(--accent2);text-decoration:none">🔗 LinkedIn</a>`:''}</div>`:''}${c.note?`<div style="margin-top:4px;color:var(--text-muted);font-style:italic;font-size:0.78rem">"${c.note}"</div>`:''}${c.source==='outreach'?'<div style="margin-top:3px;font-family:\'DM Mono\',monospace;font-size:0.58rem;color:var(--text-dim)">via Cold Outreach module</div>':''}</div><div style="display:flex;gap:6px;flex-shrink:0;align-items:center"><button onclick="toggleFollowUp(${id},${c.cid})" style="background:${c.followedUp?'rgba(126,203,161,0.15)':'var(--surface2)'};border:1px solid ${c.followedUp?'rgba(126,203,161,0.4)':'var(--border)'};border-radius:20px;padding:3px 9px;font-size:0.62rem;font-family:'DM Mono',monospace;color:${c.followedUp?'#7ecba1':'var(--text-muted)'};cursor:pointer;white-space:nowrap">${c.followedUp?'✓ Followed Up':'↪ Follow Up'}</button><button onclick="deleteContact(${id},${c.cid})" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.85rem;padding:3px 5px">✕</button></div></div>`).join('');
  const badge=document.getElementById(`contact-badge-${id}`); if(badge){badge.textContent=contacts.length;badge.style.display='inline-flex';}
  const pending=contacts.filter(c=>!c.followedUp).length;
  const dot=document.getElementById(`followup-dot-${id}`);
  if(dot){dot.style.display=pending>0?'inline-block':'none';dot.textContent=`↪ ${pending} follow-up${pending>1?'s':''}`;}
};
</script>


<script>
// ═══ LOCALSTORAGE PERSISTENCE ════════════════════════════════════════════════
const LS_KEY = 'jobhunteros_v1';

window.saveState = function() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      profile:       state.profile       || {},
      resume:        state.resume        || '',
      coverLetter:   state.coverLetter   || '',
      experienceBank:state.experienceBank|| '',
      applications:  state.applications  || [],
    }));
  } catch(e) { console.warn('saveState failed:', e); }
};

window.loadState = function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.profile)        state.profile        = s.profile;
    if (s.resume)         state.resume         = s.resume;
    if (s.coverLetter)    state.coverLetter    = s.coverLetter;
    if (s.experienceBank) state.experienceBank = s.experienceBank;
    if (s.applications)   state.applications   = s.applications;
  } catch(e) { console.warn('loadState failed:', e); }
};

// Auto-save hooks — patch after all modules are defined
document.addEventListener('DOMContentLoaded', function() {
  loadState();
  updateResumeStatus && updateResumeStatus();

  const wrap = (fn) => { const orig = window[fn]; if (typeof orig === 'function') window[fn] = function(...a) { orig(...a); saveState(); }; };
  ['saveSetup','logApplicationQuick','updateAppStatus','saveAppNotes',
   'addContactEntry','logOutreachToTracker','toggleFollowUp',
   'deleteContact','deleteApp','saveManualApp'].forEach(wrap);
});
</script>
